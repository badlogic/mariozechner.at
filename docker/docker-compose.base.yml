version: "3"
volumes:
    db_data:
services:
    web:
        image: nginx:alpine
        restart: always
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
            - ../html:/www
            - ./data/logs:/logs
        networks:
            - network

    recommendations-sync:
        build:
            context: ..
            dockerfile: docker/recommendations.Dockerfile
        restart: always
        environment:
            - TWITTER_API_KEY
            - TWITTER_BEARER_TOKEN
            - TWITTER_USERNAME=badlogicgames
            - SYNC_INTERVAL_SECONDS=3600
            - MAX_PAGES=10
            - RECOMMENDATIONS_DAYS_BACK=365
            - RECOMMENDATIONS_FILE=/www/recommended-reading/recommendations.json
            - RECOMMENDATIONS_RSS_FILE=/www/recommended-reading/rss.xml
            - RECOMMENDATIONS_DATA_FILE=/state/recommendations.json
            - STATE_FILE=/state/recommendations-state.json
        volumes:
            - ../html:/www
            - ./data/recommendations:/state
        networks:
            - network

networks:
    network:
        driver: bridge
